<mat-card appearance="outlined" class="admin-card">
  <mat-card-content>

    <div class="card-image">
      @if (product.thumbnail_url) {
        <img [ngSrc]="product.thumbnail_url" [alt]="product.title" width="80" height="80" />
      } @else {
        <div class="no-image">
          <mat-icon>image_not_supported</mat-icon>
        </div>
      }
    </div>

    <div class="card-info">
      <span class="card-title">{{ product.title }}</span>
      <span class="card-price">{{ product.price | currency:'EUR' }}</span>
      @if (product.sale) {
        <span class="sale-badge">
      -{{ ((product.original_price - product.price) / product.original_price * 100) | number:'1.0-0' }}%
    </span>
      }
    </div>

    <div class="card-actions">
      <button mat-icon-button color="primary" (click)="edit.emit(product)" aria-label="Modifica">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete.emit(product)" aria-label="Elimina">
        <mat-icon>delete</mat-icon>
      </button>
    </div>

  </mat-card-content>
</mat-card>
