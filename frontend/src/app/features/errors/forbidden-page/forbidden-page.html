<div class="forbidden-container">
  <mat-card class="forbidden-card elevation-z4">
    <mat-card-content>

      <div class="icon-container">
        <mat-icon color="warn">block</mat-icon>
      </div>

      <h1 class="mat-display-1">403</h1>
      <h2 class="mat-h2">Accesso Negato</h2>

      <p class="mat-body-1 message">
        Spiacenti, non hai i permessi necessari per visualizzare questa pagina.
        Potrebbe trattarsi di un'area riservata agli amministratori o la tua sessione potrebbe essere scaduta.
      </p>

    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-raised-button color="primary" routerLink="/">
        <mat-icon>home</mat-icon>
        TORNA ALLA HOME
      </a>
    </mat-card-actions>
  </mat-card>
</div>
