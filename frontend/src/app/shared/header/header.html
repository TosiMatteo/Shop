<mat-toolbar>
  <button matIconButton class="example-icon" aria-label="Menu" [matMenuTriggerFor]="menu">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/products">
      <mat-icon>store</mat-icon>
      <span>Products</span>
    </button>
    <button mat-menu-item routerLink="/checkout">
      <mat-icon>shopping_cart</mat-icon>
      <span>Checkout</span>
    </button>
  </mat-menu>
  <span>Rails-Angular Shop</span>
  <span class="example-spacer"></span>
  <button matIconButton (click)="goToCheckout()">
    <mat-icon>shopping_cart</mat-icon>
  </button>
</mat-toolbar>
